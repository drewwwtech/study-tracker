<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <!-- font used -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/animations.css">
    
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <div id="sidebar-header">
                <h1>Study Tracker</h1>
                <div id="player-info">
                    <p id="player-name">Hunter</p>
                    <p id="player-level">Lvl. 1</p>
                </div>
            </div>
            <ul>
                <li class="nav-item active"><a href="#">Timer</a></li> 
                <li class="nav-item"><a href="#">Profile</a></li>
                <li class="nav-item"><a href="#">Badges</a></li>
                <li class="nav-item"><a href="#">Rewards</a></li>
                <li class="nav-item"><a href="#">Notes</a></li>
                <li class="nav-item"><a href="#">Reports</a></li>
                <li class="nav-item"><a href="#">Settings</a></li>
            </ul>
        </nav>

        <main id="main-content">
            <div id="timer-view">
                <h2 id="timer-mode">Study Session</h2>
                <div id="timer-display">25:00</div>
                <div id="timer-controls">
                    <button id="start-btn">Start</button>
                    <button id="pause-btn">Pause</button>
                    <button id="end-btn">End Session</button>
                </div>
                <p id="session-count">Sessions completed: 0</p>
            </div>
        </main>
    </div>


    <script type="module" src="js/main.js"></script>
</body>
</html>
